# configs/mlp_fusion_default.yaml

architecture_name: "mlp_fusion"
experiment_name: "mlp_fusion_local_default" # Default experiment name for this local config

# --- Paths (these are defaults for local execution, Colab YAML will override them) ---
paths:
  data_root: meld_data # Relative to project root (e.g., PROJECT_ROOT/meld_data)
  output_dir_root: outputs # All outputs (models, logs, results) go under here (e.g. PROJECT_ROOT/outputs)

# --- General Project Settings (can override BaseConfig defaults if needed for this arch) ---
# dataset_name: "meld"
# input_mode: "audio_text"
# random_seed: 42
# device_name: "cuda" # BaseConfig handles detection
# num_dataloader_workers: 4 # BaseConfig handles default
# ffmpeg_path: "ffmpeg"

# --- Data Preparation ---
run_mp4_to_wav_conversion: true
run_hf_dataset_creation: true

# Audio processing settings for Hugging Face dataset creation
# sample_rate: 16000 # Default from BaseConfig
# Text processing settings for Hugging Face dataset creation
asr_model_name_for_hf_dataset: null # e.g., "openai/whisper-tiny.en" if needed
use_asr_for_text_generation_in_hf_dataset: false
text_max_length_for_hf_dataset: 128 # Default from BaseConfig, visible for arch-specific tuning

# --- Training Parameters ---
num_epochs: 10 # Arch-specific default
batch_size: 32 # Arch-specific default
learning_rate: 0.0001 # Arch-specific default
optimizer_name: "AdamW"
lr_scheduler_name: "linear"
gradient_accumulation_steps: 1
early_stopping_patience: 3
mixed_precision_training: true

# --- Evaluation Parameters ---
eval_split: "dev"

# --- Inference Parameters ---
infer_num_examples: 10
asr_model_name: "openai/whisper-tiny.en" # For --inference mode if ASR is used

# --- Dataset Specific Limits (for quick testing, can be overridden by CLI) ---
limit_dialogues_train: null
limit_dialogues_dev: null
limit_dialogues_test: null

# --- MLP Fusion Specific Parameters ---
text_encoder_model_name: "distilroberta-base"
audio_encoder_model_name: "facebook/wav2vec2-base-960h"
mlp_hidden_size: 768
mlp_dropout_rate: 0.1

# --- Audio Feature Params (used by build_hf_dataset if different from BaseConfig) ---
# BaseConfig provides defaults for: sample_rate, n_fft, hop_length, win_length, n_mels, etc.
# Only list them here if MLP Fusion requires a specific override.
# hop_length_ms: null # If null, will use hop_length (samples) from BaseConfig.
# win_length_ms: null # If null, will use win_length (samples) from BaseConfig.
# Example of overriding a BaseConfig audio param if needed:
# n_mels: 64 